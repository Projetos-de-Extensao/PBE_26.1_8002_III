site_author: Jonh Carvalho
site_name: PBE_25.2_8003
copyright: Copyright ©️ 2025, Jonh Carvalho

nav: 
  - Home: index.md
  - Iniciação: 
      - Index: Iniciacao/index.md
      - Pesquisa: Iniciacao/pesquisa.md
      - 5w2h: Iniciacao/5w2h.md
      - Brainstorming: Iniciacao/brainstorm.md
      - Mapa Mental: Iniciacao/mapa_mental.md
      - Prototipagem Baixa Fidelidade: Iniciacao/prototipo_baixa_fidelidade.md
  - Elaboração:
      - Index: Elaboracao/index.md
      - Requisitos: Elaboracao/das.md
      - Casos de Uso: 
          - Visão Geral: Elaboracao/Casos de Uso/visao_geral.md
          - Fazer Login: Elaboracao/Casos de Uso/fazer_login.md
          - Iniciar Processo: Elaboracao/Casos de Uso/iniciar_processo.md
          - Validar Contrato: Elaboracao/Casos de Uso/validar_contrato.md
          - Acompanhar Status: Elaboracao/Casos de Uso/acompanhar_status.md
          - Pesquisar Alunos: Elaboracao/Casos de Uso/pesquisar_alunos.md
          - Cadastrar Aluno: Elaboracao/Casos de Uso/cadastrar_aluno.md
          - Enviar Relatório: Elaboracao/Casos de Uso/enviar_relatorio.md
          - Reprovar Contrato: Elaboracao/Casos de Uso/reprovar_contrato.md
          - Fazer Download: Elaboracao/Casos de Uso/fazer_download.md
          - Analisar Contrato: Elaboracao/Casos de Uso/analisar_contrato.md
          - Anexar Contrato: Elaboracao/Casos de Uso/anexar_contrato.md
      - Diagrama de Classes: Elaboracao/diagrama_de_classes.md
      - Diagrama de Sequência: Elaboracao/diagrama_de_sequencia.md
      - Protótipo de Alta Fidelidade: Elaboracao/prototipo_alta_fidelidade.md
  - Construção:
      - Index: Construcao/index.md
      - Git Issues: Construcao/git_issues.md
      - GitHub Projects: Construcao/github_projects.md
      - CodeSpace: Construcao/codespace.md
  - Transição:
      - Index: Transicao/index.md

  - Bibliografia: Disciplina/bibliografia.md

extra_css:
  - css/extra.css

markdown_extensions:
  # Tooltips
  - abbr
  # Admonitions
  - admonition
  # Annotations, Buttons, Grids, Icons & Emojis, Images, Tooltips
  - attr_list
  # Footnotes
  - footnotes
  # Annotations, Grids, Images
  - md_in_html
  # Images
  - pymdownx.blocks.caption
  # Formatting
  - pymdownx.caret
  # Formatting
  - pymdownx.critic
  # Admonitions
  - pymdownx.details
  # Icons & Emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ''
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
  # Code Blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  # Code Blocks
  - pymdownx.inlinehilite
  # Formatting
  - pymdownx.keys
  # Formatting
  - pymdownx.mark
  # Code Blocks, Tooltips
  - pymdownx.snippets
  # Admonitions, Annotations, Code Blocks, Content Tabs
  - pymdownx.superfences
  # Content Tabs
  - pymdownx.tabbed:
      alternate_style: true
  # Lists
  - pymdownx.tasklist:
      custom_checkbox: true
  # Formatting
  - pymdownx.tilde
  # Data Tables

  - toc:
      permalink: true

plugins:
  - minify:
      minify_html: true
  - search
  - build_plantuml:
      render: "server"
      server: "https://www.plantuml.com/plantuml"
      output_format: "svg"
      diagram_root: "docs/assets/Diagramas"
      output_folder: "out"
      input_folder: "src"
theme:
  name: material
  logo: assets/Ibmec_logo.png
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: custom
      accent: black
      toggle:
        icon: material/toggle-switch-off
        name: Mudar para modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: black
      toggle:
        icon: material/toggle-switch-off
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/toggle-switch
        name: Preferência do sistema
  
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: simple/react
    favicon: simple/react
